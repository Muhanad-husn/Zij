# Zij default CI — Python 3.13 / uv / pytest / ruff.
# Adapted from the harness template for the Zij stack (). App is at the repo root
# (project directory ".") — if a future package moves into a subfolder, set
# `defaults.run.working-directory` and point `cache-dependency-path` at that dir's uv.lock.
#
# Secrets: env-only via .env, which is git-ignored (config contract). CI injects any secret
# through GitHub Actions secrets (referenced by name under `env:`), never inlined here.
#
# Verify action versions with find-docs/ctx7 before relying on this in anger.
name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check .

  unit:
    name: unit (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python 3.13
        run: uv python install 3.13
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run tests
        run: uv run pytest

  frontend-unit:
    name: frontend unit (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build

  frontend-e2e:
    name: frontend e2e (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers (chromium)
        run: npx playwright install --with-deps chromium
      - name: Run Playwright e2e tests
        run: npm run test:e2e
      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 14
